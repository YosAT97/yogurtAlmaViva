<!DOCTYPE html> <html lang="es"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Alma Viva - Gestión</title> <link rel="apple-touch-icon" href="https://raw.githubusercontent.com/yosat97/yosat97.github.io/main/IMG_9589.jpeg"> <style> :root { --primary: #7c8c64; --accent: #a4b494; --danger: #d32f2f; --bg-overlay: rgba(255, 255, 255, 0.9); } * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } body { margin: 0; background: url('https://raw.githubusercontent.com/yosat97/yosat97.github.io/main/IMG_9555.jpeg') no-repeat center center fixed; background-size: cover; color: #333; padding-bottom: 60px; } .glass-panel { background: var(--bg-overlay); backdrop-filter: blur(5px); min-height: 100vh; padding: 15px; } .header { background: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; } .logo-img { height: 40px; } .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 2px 8px rgba(0,0,0,0.05); } .btn { background: var(--primary); color: white; border: none; padding: 14px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; margin-bottom: 10px; cursor: pointer; } .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; } .stat-box { background: white; padding: 12px; border-radius: 10px; text-align: center; border-top: 4px solid var(--primary); } .stat-val { font-size: 20px; font-weight: bold; color: var(--primary); display: block; } .calendar-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; } .day-circle { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #ddd; font-size: 12px; } .day-active { background: var(--primary); color: white; border-color: var(--primary); } .hidden { display: none !important; } .input, .select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; } </style> </head> <body> <div class="glass-panel"> <div id="app"> <div class="header"> <img src="https://raw.githubusercontent.com/yosat97/yosat97.github.io/main/IMG_9589.jpeg" class="logo-img"> <h3 style="margin:0; color:var(--primary)">Alma Viva</h3> <span onclick="ver('cal')" style="font-size: 24px; cursor:pointer">📅</span> </div> <div id="v-lista" class="view"> <button class="btn" onclick="ver('nuevo')">+ AGREGAR CLIENTE</button> <div id="lista-clientes"></div> </div> <div id="v-cal" class="view hidden"> <div class="calendar-nav"> <button onclick="cambiarMes(-1)">◀</button> <h4 id="cal-mes-nombre">Marzo 2026</h4> <button onclick="cambiarMes(1)">▶</button> </div> <div class="card"> <h4 style="margin-top:0">🚀 Plan de Producción</h4> <div class="stats-grid"> <div class="stat-box"> <span class="stat-val" id="prod-semanal">0L</span> <small>Semanal (+2L)</small> </div> <div class="stat-box"> <span class="stat-val" id="prod-mensual">0L</span> <small>Mensual (+2L)</small> </div> </div> </div> <div id="entregas-dia" class="card"> <h4>Entregas del día</h4> <div id="lista-entregas-dia">Selecciona un día para ver entregas.</div> </div> <button class="btn" style="background:#666" onclick="ver('lista')">VOLVER</button> </div> <div id="v-nuevo" class="view hidden"> <div class="card"> <h3>Nuevo Registro</h3> <input id="f-nom" class="input" placeholder="Nombre del cliente"> <select id="f-dia" class="select"> <option value="1">Lunes (Entrega semanal)</option> <option value="3">Miércoles (Entrega semanal)</option> <option value="5">Viernes (Entrega semanal)</option> </select> <div style="display:flex; gap:10px"> <input id="f-12" class="input" type="number" placeholder="Cant. 1/2 L"> <input id="f-1" class="input" type="number" placeholder="Cant. 1 L"> </div> <button class="btn" onclick="guardar()">GUARDAR SUSCRIPCIÓN</button> <button class="btn" style="background:#ccc; color:#333" onclick="ver('lista')">CANCELAR</button> </div> </div> </div> </div> <script> var clientes = JSON.parse(localStorage.getItem('alma_viva_data')) || []; var hoy = new Date(); var mesActual = hoy.getMonth(); var añoActual = hoy.getFullYear(); function ver(id) { document.querySelectorAll('.view').forEach(v => v.classList.add('hidden')); document.getElementById('v-' + id).classList.remove('hidden'); if(id === 'lista') dibujarLista(); if(id === 'cal') calcularProduccion(); } function guardar() { var c = { id: Date.now(), nom: document.getElementById('f-nom').value, dia: document.getElementById('f-dia').value, c12: parseFloat(document.getElementById('f-12').value) || 0, c1: parseFloat(document.getElementById('f-1').value) || 0, pausado: false }; clientes.push(c); localStorage.setItem('alma_viva_data', JSON.stringify(clientes)); ver('lista'); } function dibujarLista() { var html = ""; clientes.forEach((c, i) => { html += `<div class="card"> <strong>${c.nom}</strong><br> <small>Pedido: ${c.c12} de 1/2L | ${c.c1} de 1L</small> </div>`; }); document.getElementById('lista-clientes').innerHTML = html || "<p style='text-align:center'>No hay clientes registrados.</p>"; } function calcularProduccion() { var totalLitrosSemana = 0; clientes.forEach(c => { if(!c.pausado) { totalLitrosSemana += (c.c12 * 0.5) + (c.c1 * 1); } }); // Aplicamos el margen de 2 litros extra solicitado var semanalTotal = totalLitrosSemana > 0 ? totalLitrosSemana + 2 : 0; var mensualTotal = (totalLitrosSemana * 4) + 2; document.getElementById('prod-semanal').innerText = semanalTotal + "L"; document.getElementById('prod-mensual').innerText = mensualTotal + "L"; // Simulación de calendario rápido para iPhone document.getElementById('cal-mes-nombre').innerText = new Intl.DateTimeFormat('es-ES', { month: 'long', year: 'numeric' }).format(new Date(añoActual, mesActual)); } function cambiarMes(dir) { mesActual += dir; calcularProduccion(); } window.onload = () => ver('lista'); </script> </body> </html>
