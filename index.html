<!DOCTYPE html> <html> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>Yogurt App</title> <style> body { font-family: sans-serif; margin: 0; background: #f4f4f9; padding-bottom: 50px; } .header { background: #4a7c2f; color: white; padding: 15px; text-align: center; } .content { padding: 15px; } .btn { background: #4a7c2f; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; margin-bottom: 10px; display: block; text-decoration: none; text-align: center; } .input { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; } .card { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; } .hidden { display: none !important; } </style> </head> <body> <div class="header"> <h2 id="titulo">🥛 YogurtRutas</h2> </div> <div id="pantalla-lista" class="content"> <button class="btn" onclick="irANuevo()">+ NUEVO CLIENTE</button> <div id="lista" style="margin-top: 20px;"></div> <hr> <button class="btn" style="background:#666; margin-top: 40px;" onclick="exportarDatos()">📥 GUARDAR COPIA</button> </div> <div id="pantalla-nuevo" class="content hidden"> <h3>Datos del Cliente</h3> <input type="text" id="nombre" class="input" placeholder="Nombre completo"> <input type="text" id="direccion" class="input" placeholder="Dirección"> <button class="btn" onclick="guardar()">✅ GUARDAR AHORA</button> <button class="btn" style="background:#cc0000" onclick="irALista()">CANCELAR</button> </div> <script> // Cargar datos var clientes = JSON.parse(localStorage.getItem('yogurt_v10')) || []; function irANuevo() { document.getElementById('pantalla-lista').classList.add('hidden'); document.getElementById('pantalla-nuevo').classList.remove('hidden'); document.getElementById('titulo').innerText = "Nuevo Registro"; } function irALista() { document.getElementById('pantalla-nuevo').classList.add('hidden'); document.getElementById('pantalla-lista').classList.remove('hidden'); document.getElementById('titulo').innerText = "🥛 YogurtRutas"; mostrarClientes(); } function guardar() { var n = document.getElementById('nombre').value; var d = document.getElementById('direccion').value; if(n == "" || d == "") { alert("Por favor escribe nombre y dirección"); return; } clientes.push({nombre: n, direccion: d}); localStorage.setItem('yogurt_v10', JSON.stringify(clientes)); document.getElementById('nombre').value = ""; document.getElementById('direccion').value = ""; irALista(); } function mostrarClientes() { var html = ""; for(var i=0; i < clientes.length; i++) { html += '<div class="card"><div><strong>' + clientes[i].nombre + '</strong><br><small>' + clientes[i].direccion + '</small></div><span>➡️</span></div>'; } if(clientes.length == 0) html = "<p style='text-align:center; color:#888'>No hay clientes.</p>"; document.getElementById('lista').innerHTML = html; } function exportarDatos() { var data = JSON.stringify(clientes); var blob = new Blob([data], {type: "text/json"}); var url = URL.createObjectURL(blob); var a = document.createElement("a"); a.href = url; a.download = "respaldo_yogurt.json"; a.click(); alert("Copia descargada"); } // Arrancar mostrarClientes(); </script> </body> </html>
