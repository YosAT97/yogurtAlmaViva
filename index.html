<!DOCTYPE html> <html lang="es"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"> <title>YogurtRutas</title> <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script> <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script> <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script> <style> body { font-family: sans-serif; margin: 0; background: #f0f0f0; display: flex; justify-content: center; padding: 20px; } .app-container { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; } .btn { background: #4a7c2f; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-weight: bold; margin-top: 10px; } .config-btn { background: none; border: none; font-size: 24px; float: right; cursor: pointer; } </style> </head> <body> <div id="root">Cargando...</div> <script type="text/babel"> const { useState, useEffect } = React; function App() { const [clients, setClients] = useState(() => { const saved = localStorage.getItem("yogurt_v1"); return saved ? JSON.parse(saved) : []; }); const [page, setPage] = useState("inicio"); useEffect(() => { localStorage.setItem("yogurt_v1", JSON.stringify(clients)); }, [clients]); const exportar = () => { const blob = new Blob([JSON.stringify(clients)], {type: "application/json"}); const url = URL.createObjectURL(blob); const a = document.createElement("a"); a.href = url; a.download = "respaldo_yogurt.json"; a.click(); }; return ( <div className="app-container"> <button className="config-btn" onClick={() => setPage("cfg")}>⚙️</button> <h1>🥛 YogurtRutas</h1> {page === "inicio" && ( <div> <button className="btn" onClick={() => setPage("nuevo")}>+ Nuevo Cliente</button> <div style={{marginTop: '20px'}}> {clients.length === 0 ? <p>No hay clientes aún</p> : clients.map((c, i) => <div key={i} style={{borderBottom:'1px solid #eee', padding:'10px'}}>{c.nombre}</div>)} </div> </div> )} {page === "nuevo" && ( <div> <input id="n" placeholder="Nombre" style={{width:'100%', padding:'10px', marginBottom:'10px'}} /> <button className="btn" onClick={() => { const val = document.getElementById("n").value; if(val) { setClients([...clients, {nombre: val}]); setPage("inicio"); } }}>Guardar</button> <button onClick={() => setPage("inicio")} style={{marginTop:'10px', border:'none', background:'none'}}>Cancelar</button> </div> )} {page === "cfg" && ( <div> <h3>Respaldo</h3> <button className="btn" onClick={exportar}>Descargar Copia</button> <button className="btn" style={{background:'#ccc'}} onClick={() => setPage("inicio")}>Volver</button> </div> )} </div> ); } const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />); </script> </body> </html>
